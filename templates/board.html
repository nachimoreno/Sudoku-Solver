<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku Solver — Pattern {{ pattern }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px;
      color: #1a1a2e;
    }

    header {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 { font-size: 1.4rem; font-weight: 700; }
    h1 span { font-size: 0.875rem; font-weight: 400; color: #888; margin-left: 8px; }

    .main {
      display: flex;
      gap: 28px;
      width: 100%;
      max-width: 900px;
      align-items: stretch;
    }

    /* ── Board ─────────────────────────────────────────── */
    .board-wrap { flex-shrink: 0; }

    table {
      border-collapse: collapse;
      border: 3px solid #1a1a2e;
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    table.solved-glow {
      border-color: #16a34a;
      box-shadow: 0 0 20px #86efac88;
    }

    td {
      width: 58px;
      height: 58px;
      border: 1px solid #c0c0c0;
      text-align: center;
      vertical-align: middle;
      padding: 0;
    }

    td.box-right  { border-right:  3px solid #1a1a2e; }
    td.box-bottom { border-bottom: 3px solid #1a1a2e; }

    .given  { font-size: 28px; font-weight: 700; color: #1a1a2e; }
    .solved { font-size: 28px; font-weight: 700; color: #2563eb; }

    .candidates {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      width: 100%;
      height: 100%;
      padding: 3px;
    }

    .candidates span {
      font-size: 11px;
      color: #999;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    @keyframes flash-placed {
      0%   { background-color: #86efac; }
      100% { background-color: transparent; }
    }
    @keyframes flash-eliminated {
      0%   { background-color: #fde68a; }
      100% { background-color: transparent; }
    }

    .hl-placed     { animation: flash-placed     1.8s ease-out forwards; }
    .hl-eliminated { animation: flash-eliminated 1.8s ease-out forwards; }

    /* ── Controls ──────────────────────────────────────── */
    .controls {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 220px;
      min-height: 0;
    }

    .eliminators-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .eliminators-card h3 { flex-shrink: 0; }

    .eliminators-card .btn-group {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .card h3 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: #aaa;
      margin-bottom: 10px;
    }

    .btn-group { display: flex; flex-direction: column; gap: 8px; }

    button {
      padding: 9px 14px;
      border: none;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: filter 0.12s, transform 0.1s;
    }

    button:hover:not(:disabled)  { filter: brightness(0.93); }
    button:active:not(:disabled) { transform: scale(0.97); }
    button:disabled               { opacity: 0.38; cursor: not-allowed; }

    .btn-placer     { background: #dbeafe; color: #1d4ed8; }
    .btn-eliminator { background: #fef3c7; color: #92400e; }
    .btn-reset      { background: #e2e8f0; color: #475569;
                      padding: 8px 18px; border-radius: 7px;
                      font-size: 0.85rem; font-weight: 500; }

    /* ── Help button ───────────────────────────────────── */
    .btn-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-row .solver-btn { flex: 1; }

    .btn-help {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      padding: 0;
      border-radius: 50%;
      font-size: 0.72rem;
      font-weight: 600;
      background: #e2e8f0;
      color: #64748b;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .btn-help:hover { background: #cbd5e1; color: #1a1a2e; }

    /* ── How does it work card ─────────────────────────── */
    .help-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .help-close {
      width: 20px;
      height: 20px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: #e2e8f0;
      color: #64748b;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.15s;
    }

    .help-close:hover { background: #cbd5e1; color: #1a1a2e; }

    /* ── Bottom info row ──────────────────────────────── */
    .bottom-row {
      display: flex;
      gap: 28px;
      width: 100%;
      max-width: 900px;
      margin-top: 20px;
      height: 190px;
    }

    .bottom-row > .card {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    #help-text {
      font-size: 0.8rem;
      line-height: 1.65;
      color: #444;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    /* ── Status ────────────────────────────────────────── */
    #status-header {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1a1a2e;
      flex-shrink: 0;
    }

    #status-log {
      overflow-y: auto;
      font-size: 0.78rem;
      line-height: 1.7;
      flex: 1;
      min-height: 0;
    }

    .log-placed     { color: #15803d; }
    .log-eliminated { color: #92400e; }
    .log-none       { color: #aaa; font-style: italic; }

    /* ── Solved banner ─────────────────────────────────── */
    #solved-banner {
      display: none;
      background: #dcfce7;
      border: 1.5px solid #86efac;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #15803d;
      text-align: center;
      flex-shrink: 0;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

<header>
  <h1>Sudoku Solver <span>Pattern {{ pattern }}</span></h1>
  <button class="btn-reset" id="reset-btn" onclick="resetBoard()">↺ Reset</button>
</header>

<div class="main">
  <div class="board-wrap">
    <table id="board"></table>
  </div>

  <div class="controls">

    <div class="card">
      <h3>Placers</h3>
      <div class="btn-group">
        {% for s in placers %}
        <div class="btn-row">
          <button class="btn-placer solver-btn" data-key="{{ s.key }}"
                  onclick="runSolver('{{ s.key }}')">{{ s.label }}</button>
          <button class="btn-help" onclick="showHelp('{{ s.key }}')" title="How does {{ s.label }} work?">?</button>
        </div>
        {% endfor %}
      </div>
    </div>

    <div class="card eliminators-card">
      <h3>Eliminators</h3>
      <div class="btn-group">
        {% for s in eliminators %}
        <div class="btn-row">
          <button class="btn-eliminator solver-btn" data-key="{{ s.key }}"
                  onclick="runSolver('{{ s.key }}')">{{ s.label }}</button>
          <button class="btn-help" onclick="showHelp('{{ s.key }}')" title="How does {{ s.label }} work?">?</button>
        </div>
        {% endfor %}
      </div>
    </div>

  </div>
</div>

<div class="bottom-row">
  <div class="card">
    <div class="help-card-header">
      <h3>How does it work?</h3>
      <button class="help-close" id="help-close" onclick="closeHelp()" style="display:none" title="Back to overview">✕</button>
    </div>
    <div id="help-text"></div>
  </div>

  <div class="card">
    <div id="status-header">Ready — make a move.</div>
    <div id="solved-banner">✓ Puzzle solved!</div>
    <div id="status-log"></div>
  </div>
</div>

<script>
  // Solver label map built from template data — avoids hard-coding in JS
  const SOLVER_LABELS = {
    {% for s in placers + eliminators %}
    '{{ s.key }}': '{{ s.label }}',
    {% endfor %}
  };

  let boardSolved = false;

  // ── Render ────────────────────────────────────────────────────────────────

  function renderBoard(board, changes) {
    const placed     = new Set();
    const eliminated = new Set();
    if (changes) {
      for (const c of changes) {
        (c.type === 'placed' ? placed : eliminated).add(`${c.row},${c.col}`);
      }
    }

    const table = document.getElementById('board');
    table.innerHTML = '';

    for (let row = 0; row < 9; row++) {
      const tr = document.createElement('tr');
      for (let col = 0; col < 9; col++) {
        const cell = board[row][col];
        const td   = document.createElement('td');
        td.dataset.row = row;
        td.dataset.col = col;

        if (col === 2 || col === 5) td.classList.add('box-right');
        if (row === 2 || row === 5) td.classList.add('box-bottom');

        const key = `${row},${col}`;
        if      (placed.has(key))     td.classList.add('hl-placed');
        else if (eliminated.has(key)) td.classList.add('hl-eliminated');

        if (cell.value !== 0) {
          const span = document.createElement('span');
          span.className   = cell.given ? 'given' : 'solved';
          span.textContent = cell.value;
          td.appendChild(span);
        } else {
          const grid = document.createElement('div');
          grid.className = 'candidates';
          for (let d = 1; d <= 9; d++) {
            const s = document.createElement('span');
            s.textContent = cell.candidates.includes(d) ? d : '';
            grid.appendChild(s);
          }
          td.appendChild(grid);
        }

        tr.appendChild(td);
      }
      table.appendChild(tr);
    }
  }

  // ── Status log ───────────────────────────────────────────────────────────

  function updateStatus(data) {
    const header = document.getElementById('status-header');
    const log    = document.getElementById('status-log');
    const label  = SOLVER_LABELS[data.solver] || data.solver;

    if (data.changes.length === 0) {
      header.textContent = `${label} — no changes`;
      log.innerHTML = '<div class="log-none">Nothing to do.</div>';
      return;
    }

    header.textContent = `${label} — ${data.placed} placed, ${data.eliminated} eliminated`;

    // Placements first, then eliminations, each sorted by row then col
    const placed = data.changes.filter(c => c.type === 'placed');
    const elim   = data.changes.filter(c => c.type === 'eliminated');

    const lines = [
      ...placed.map(c =>
        `<div class="log-placed">Placed <strong>${c.value}</strong> → row ${c.row + 1}, col ${c.col + 1}</div>`
      ),
      ...elim.map(c =>
        `<div class="log-eliminated">Removed candidate <strong>${c.value}</strong> from row ${c.row + 1}, col ${c.col + 1}</div>`
      ),
    ];

    log.innerHTML = lines.join('');
    log.scrollTop = 0;
  }

  // ── Button state ─────────────────────────────────────────────────────────

  function setSolverButtonsDisabled(disabled) {
    document.querySelectorAll('.solver-btn').forEach(b => b.disabled = disabled);
  }

  // ── Actions ──────────────────────────────────────────────────────────────

  async function runSolver(key) {
    setSolverButtonsDisabled(true);
    try {
      const res  = await fetch(`/run/${key}`, { method: 'POST' });
      const data = await res.json();
      renderBoard(data.board, data.changes);
      updateStatus(data);
      if (data.is_solved) {
        boardSolved = true;
        document.getElementById('board').classList.add('solved-glow');
        document.getElementById('solved-banner').style.display = 'block';
        document.getElementById('reset-btn').disabled = false;
      }
    } catch (e) {
      document.getElementById('status-header').textContent = 'Error — see console.';
      console.error(e);
    } finally {
      if (!boardSolved) setSolverButtonsDisabled(false);
    }
  }

  async function resetBoard() {
    try {
      const res  = await fetch('/reset', { method: 'POST' });
      const data = await res.json();
      boardSolved = false;
      renderBoard(data.board, []);
      document.getElementById('status-header').textContent = 'Ready — make a move.';
      document.getElementById('status-log').innerHTML = '';
      document.getElementById('board').classList.remove('solved-glow');
      document.getElementById('solved-banner').style.display = 'none';
      document.getElementById('reset-btn').disabled = false;
      setSolverButtonsDisabled(false);
    } catch (e) {
      console.error(e);
    }
  }

  // ── Help panel ───────────────────────────────────────────────────────────

  const DEFAULT_HELP_TEXT =
    'This is an automatic Sudoku solver. Use the buttons above to apply ' +
    'solving techniques one step at a time — each technique either places a ' +
    'digit directly into a cell or eliminates candidates to narrow down ' +
    'possibilities. Click the <strong>?</strong> button next to any technique ' +
    'to learn how it works.';

  const HELP_TEXTS = {
    'NakedSingleSolver':
      '<strong>Naked Singles</strong><br><br>' +
      'A naked single is the simplest solving technique. When a cell has only ' +
      'one remaining candidate, that digit must go there — all other digits are ' +
      'already present in the cell\'s row, column, or 3×3 box, leaving exactly ' +
      'one possibility. The solver scans every empty cell and places the value ' +
      'wherever only one candidate remains.',

    'HiddenSingleSolver':
      '<strong>Hidden Singles</strong><br><br>' +
      'A hidden single occurs when a digit can only fit in one cell within a ' +
      'row, column, or 3×3 box — even if that cell appears to have multiple ' +
      'candidates. The digit is "hidden" among others, but every other position ' +
      'in the unit is already ruled out. The solver checks each unit for digits ' +
      'that appear in exactly one candidate list and places them there.',

    'PointingPairsSolver':
      '<strong>Pointing Pairs</strong><br><br>' +
      'Within a 3×3 box, if a candidate digit only appears in cells that all ' +
      'share the same row or column, it must end up in one of those cells. That ' +
      'means the digit can be safely eliminated from every other cell in that ' +
      'row or column that lies outside the box. This works for 2-cell pairs and ' +
      '3-cell triples alike.',

    'NakedPairSolver':
      '<strong>Naked Pairs</strong><br><br>' +
      'When exactly two cells in the same row, column, or 3×3 box each contain ' +
      'the same two candidates — and only those two — those two digits must ' +
      'occupy those two cells in some order. Every other cell in the shared unit ' +
      'can therefore have both of those candidates removed.',

    'NakedTripleSolver':
      '<strong>Naked Triples</strong><br><br>' +
      'Like Naked Pairs but extended to three cells. If three cells in a unit ' +
      'collectively contain only three distinct candidates (each cell holding ' +
      '2 or 3 of those three digits), those digits are locked inside those ' +
      'three cells. All other cells in the same unit can have those three ' +
      'candidates eliminated.',

    'HiddenPairSolver':
      '<strong>Hidden Pairs</strong><br><br>' +
      'If two digits appear as candidates in only two cells within a unit ' +
      '(row, column, or box), those two digits must occupy those two cells ' +
      'in some order — even though the cells may appear to have many candidates. ' +
      'All other candidates can be removed from those two cells, leaving them ' +
      'as a naked pair.',

    'HiddenTripleSolver':
      '<strong>Hidden Triples</strong><br><br>' +
      'Like Hidden Pairs extended to three digits. If three digits are ' +
      'collectively confined to only three cells within a unit, those three ' +
      'cells must contain those three digits. Every other candidate in those ' +
      'three cells can be eliminated.',

    'NakedQuadSolver':
      '<strong>Naked Quads</strong><br><br>' +
      'When four cells in a unit collectively contain only four distinct ' +
      'candidates (each cell holding between 2 and 4 of those digits), ' +
      'those four digits are locked into those four cells. All other cells ' +
      'in the same unit can have those four candidates removed.',

    'BoxLineReductionSolver':
      '<strong>Box/Line Reduction</strong><br><br>' +
      'The complement of Pointing Pairs. If a candidate in a row or column ' +
      'only appears inside a single 3×3 box, that digit is claimed by the ' +
      'box — it can be eliminated from all other cells in that box that are ' +
      'not part of the original row or column.',

    'XWingSolver':
      '<strong>X-Wing</strong><br><br>' +
      'When a candidate appears in exactly two cells in each of two rows, and ' +
      'both rows share the same two columns, the digit must land in one of ' +
      'those two columns — so it can be eliminated from everywhere else in ' +
      'those two columns. The same logic applies with rows and columns swapped.',

    'SimpleColoringSolver':
      '<strong>Simple Coloring</strong><br><br>' +
      'Chains conjugate pairs — units where a candidate appears exactly twice — ' +
      'and assigns alternating colors. One color must be correct, the other wrong. ' +
      'If two same-color cells share a unit, that color is impossible and all its ' +
      'cells are eliminated. Any cell outside the chain that sees both colors can ' +
      'also have the candidate removed.',

    'SkyscraperSolver':
      '<strong>Skyscraper</strong><br><br>' +
      'Two rows each have exactly two occurrences of a candidate and share ' +
      'exactly one column (the "leg"). The two non-shared cells are the tips. ' +
      'One of the tips must contain the digit, so any cell that sees both tips ' +
      'can have the candidate eliminated. The same logic applies column-wise.',

    'SwordfishSolver':
      '<strong>Swordfish</strong><br><br>' +
      'An extension of X-Wing to three rows. If a candidate appears 2–3 times ' +
      'in each of three rows and their combined column positions cover exactly ' +
      'three columns, the digit must land in those columns — so it can be ' +
      'eliminated from those columns in all other rows. Also applies with rows ' +
      'and columns swapped.',

    'XYWingSolver':
      '<strong>XY-Wing</strong><br><br>' +
      'A pivot cell with two candidates {X, Y} sees one wing with {X, Z} and ' +
      'another wing with {Y, Z}. Whatever value the pivot takes, Z is forced ' +
      'into one of the wings — so Z can be eliminated from any cell that sees ' +
      'both wings simultaneously.',

    'XYZWingSolver':
      '<strong>XYZ-Wing</strong><br><br>' +
      'Like XY-Wing but the pivot has three candidates {X, Y, Z} instead of ' +
      'two. The pivot sees wing {X, Z} and wing {Y, Z}. Because the pivot ' +
      'itself could hold Z, the elimination is tighter: Z can only be removed ' +
      'from cells that see all three of the pivot, wing1, and wing2.',

    'UniqueRectangleSolver':
      '<strong>Unique Rectangle</strong><br><br>' +
      'Relies on the guarantee that a valid puzzle has exactly one solution. ' +
      'If three corners of a 2×2 rectangle (spanning at least two boxes) contain ' +
      'only the same two candidates, placing either digit in the fourth corner ' +
      'would create a deadly pattern with two solutions. Both candidates are ' +
      'therefore eliminated from the fourth corner.',
  };

  function showHelp(key) {
    document.getElementById('help-text').innerHTML = HELP_TEXTS[key] || DEFAULT_HELP_TEXT;
    document.getElementById('help-close').style.display = 'flex';
  }

  function closeHelp() {
    document.getElementById('help-text').innerHTML = DEFAULT_HELP_TEXT;
    document.getElementById('help-close').style.display = 'none';
  }

  // ── Init ─────────────────────────────────────────────────────────────────

  // Pin the controls column to the board's actual rendered height so the
  // eliminators list scrolls rather than pushing the column taller.
  function syncControlsHeight() {
    document.querySelector('.controls').style.height =
      document.getElementById('board').offsetHeight + 'px';
  }

  renderBoard({{ board_json | tojson }}, []);
  document.getElementById('help-text').innerHTML = DEFAULT_HELP_TEXT;
  syncControlsHeight();
</script>

</body>
</html>
