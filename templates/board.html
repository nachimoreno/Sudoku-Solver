<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku Solver — Pattern {{ pattern }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px;
      color: #1a1a2e;
    }

    header {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 { font-size: 1.4rem; font-weight: 700; }
    h1 span { font-size: 0.875rem; font-weight: 400; color: #888; margin-left: 8px; }

    .main {
      display: flex;
      gap: 28px;
      width: 100%;
      max-width: 900px;
      align-items: stretch;
    }

    /* ── Board ─────────────────────────────────────────── */
    .board-wrap { flex-shrink: 0; }

    table {
      border-collapse: collapse;
      border: 3px solid #1a1a2e;
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    table.solved-glow {
      border-color: #16a34a;
      box-shadow: 0 0 20px #86efac88;
    }

    td {
      width: 58px;
      height: 58px;
      border: 1px solid #c0c0c0;
      text-align: center;
      vertical-align: middle;
      padding: 0;
    }

    td.box-right  { border-right:  3px solid #1a1a2e; }
    td.box-bottom { border-bottom: 3px solid #1a1a2e; }

    .given  { font-size: 28px; font-weight: 700; color: #1a1a2e; }
    .solved { font-size: 28px; font-weight: 700; color: #2563eb; }

    .candidates {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      width: 100%;
      height: 100%;
      padding: 3px;
    }

    .candidates span {
      font-size: 11px;
      color: #999;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    @keyframes flash-placed {
      0%   { background-color: #86efac; }
      100% { background-color: transparent; }
    }
    @keyframes flash-eliminated {
      0%   { background-color: #fde68a; }
      100% { background-color: transparent; }
    }

    .hl-placed     { animation: flash-placed     1.8s ease-out forwards; }
    .hl-eliminated { animation: flash-eliminated 1.8s ease-out forwards; }

    /* ── Controls ──────────────────────────────────────── */
    .controls {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 220px;
      min-height: 0;
    }

    .eliminators-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .eliminators-card h3 { flex-shrink: 0; }

    .eliminators-card .btn-group {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .card h3 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: #aaa;
      margin-bottom: 10px;
    }

    .btn-group { display: flex; flex-direction: column; gap: 8px; }

    button {
      padding: 9px 14px;
      border: none;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: filter 0.12s, transform 0.1s;
    }

    button:hover:not(:disabled)  { filter: brightness(0.93); }
    button:active:not(:disabled) { transform: scale(0.97); }
    button:disabled               { opacity: 0.38; cursor: not-allowed; }

    .btn-placer     { background: #dbeafe; color: #1d4ed8; }
    .btn-eliminator { background: #fef3c7; color: #92400e; }
    .btn-reset      { background: #e2e8f0; color: #475569;
                      padding: 8px 18px; border-radius: 7px;
                      font-size: 0.85rem; font-weight: 500; }

    /* ── Help button ───────────────────────────────────── */
    .btn-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-row .solver-btn { flex: 1; }

    .btn-help {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      padding: 0;
      border-radius: 50%;
      font-size: 0.72rem;
      font-weight: 600;
      background: #e2e8f0;
      color: #64748b;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .btn-help:hover { background: #cbd5e1; color: #1a1a2e; }

    /* ── How does it work card ─────────────────────────── */
    .help-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .help-close {
      width: 20px;
      height: 20px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: #e2e8f0;
      color: #64748b;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.15s;
    }

    .help-close:hover { background: #cbd5e1; color: #1a1a2e; }

    /* ── Bottom info row ──────────────────────────────── */
    .bottom-row {
      display: flex;
      gap: 28px;
      width: 100%;
      max-width: 900px;
      margin-top: 20px;
      height: 190px;
    }

    .bottom-row > .card {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    #help-text {
      font-size: 0.8rem;
      line-height: 1.65;
      color: #444;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    .help-entry h4 {
      font-size: 1rem;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .help-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      margin-bottom: 8px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: #e2e8f0;
      color: #475569;
    }

    .help-entry p,
    .help-entry ul {
      margin-bottom: 10px;
    }

    .help-entry ul {
      padding-left: 18px;
    }

    .help-entry li {
      margin-bottom: 6px;
    }

    .help-diagram {
      margin-top: 14px;
      border: 1px solid #dbe3ee;
      border-radius: 10px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      padding: 10px;
    }

    .help-diagram-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 8px;
    }

    .help-diagram-caption {
      font-size: 0.72rem;
      color: #475569;
      margin-top: 8px;
    }

    .mini-grid {
      display: grid;
      gap: 6px;
    }

    .mini-grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .mini-grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .mini-grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .mini-grid.cols-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }

    .mini-cell {
      min-height: 50px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      padding: 6px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .mini-cell-label {
      font-size: 0.62rem;
      color: #64748b;
      margin-bottom: 4px;
      line-height: 1.1;
    }

    .mini-cell-main {
      font-size: 0.76rem;
      font-weight: 700;
      color: #1e293b;
      line-height: 1.2;
    }

    .mini-cell.focus {
      background: #dbeafe;
      border-color: #60a5fa;
    }

    .mini-cell.keep {
      background: #dcfce7;
      border-color: #4ade80;
    }

    .mini-cell.cut {
      background: #fef3c7;
      border-color: #f59e0b;
    }

    .mini-cell.pivot {
      background: #e0e7ff;
      border-color: #818cf8;
    }

    .mini-cell.wing {
      background: #dcfce7;
      border-color: #34d399;
    }

    .mini-cell.tip {
      background: #e0f2fe;
      border-color: #38bdf8;
    }

    .mini-cell.deadly {
      background: #ffe4e6;
      border-color: #fb7185;
    }

    .mini-cell.color-a {
      background: #dbeafe;
      border-color: #60a5fa;
    }

    .mini-cell.color-b {
      background: #fde68a;
      border-color: #f59e0b;
    }

    .mini-cell.muted {
      opacity: 0.6;
    }

    .mini-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .mini-legend span {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 0.65rem;
      font-weight: 600;
      background: #e2e8f0;
      color: #475569;
    }

    .mini-legend .focus,
    .mini-legend .color-a {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .mini-legend .keep,
    .mini-legend .wing {
      background: #dcfce7;
      color: #15803d;
    }

    .mini-legend .cut,
    .mini-legend .color-b {
      background: #fef3c7;
      color: #92400e;
    }

    .mini-legend .pivot {
      background: #e0e7ff;
      color: #4338ca;
    }

    .mini-legend .tip {
      background: #e0f2fe;
      color: #0369a1;
    }

    .mini-legend .deadly {
      background: #ffe4e6;
      color: #be123c;
    }

    /* ── Status ────────────────────────────────────────── */
    #status-header {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1a1a2e;
      flex-shrink: 0;
    }

    #status-log {
      overflow-y: auto;
      font-size: 0.78rem;
      line-height: 1.7;
      flex: 1;
      min-height: 0;
    }

    .log-placed     { color: #15803d; }
    .log-eliminated { color: #92400e; }
    .log-none       { color: #aaa; font-style: italic; }

    /* ── Solved banner ─────────────────────────────────── */
    #solved-banner {
      display: none;
      background: #dcfce7;
      border: 1.5px solid #86efac;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #15803d;
      text-align: center;
      flex-shrink: 0;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

<header>
  <h1>Sudoku Solver <span>Pattern {{ pattern }}</span></h1>
  <button class="btn-reset" id="reset-btn" onclick="resetBoard()">↺ Reset</button>
</header>

<div class="main">
  <div class="board-wrap">
    <table id="board"></table>
  </div>

  <div class="controls">

    <div class="card">
      <h3>Placers</h3>
      <div class="btn-group">
        {% for s in placers %}
        <div class="btn-row">
          <button class="btn-placer solver-btn" data-key="{{ s.key }}"
                  onclick="runSolver('{{ s.key }}')">{{ s.label }}</button>
          <button class="btn-help" onclick="showHelp('{{ s.key }}')" title="How does {{ s.label }} work?">?</button>
        </div>
        {% endfor %}
      </div>
    </div>

    <div class="card eliminators-card">
      <h3>Eliminators</h3>
      <div class="btn-group">
        {% for s in eliminators %}
        <div class="btn-row">
          <button class="btn-eliminator solver-btn" data-key="{{ s.key }}"
                  onclick="runSolver('{{ s.key }}')">{{ s.label }}</button>
          <button class="btn-help" onclick="showHelp('{{ s.key }}')" title="How does {{ s.label }} work?">?</button>
        </div>
        {% endfor %}
      </div>
    </div>

  </div>
</div>

<div class="bottom-row">
  <div class="card">
    <div class="help-card-header">
      <h3>How does it work?</h3>
      <button class="help-close" id="help-close" onclick="closeHelp()" style="display:none" title="Back to overview">✕</button>
    </div>
    <div id="help-text"></div>
  </div>

  <div class="card">
    <div id="status-header">Ready — make a move.</div>
    <div id="solved-banner">✓ Puzzle solved!</div>
    <div id="status-log"></div>
  </div>
</div>

<script>
  // Solver label map built from template data — avoids hard-coding in JS
  const SOLVER_LABELS = {
    {% for s in placers + eliminators %}
    '{{ s.key }}': '{{ s.label }}',
    {% endfor %}
  };

  let boardSolved = false;

  // ── Render ────────────────────────────────────────────────────────────────

  function renderBoard(board, changes) {
    const placed     = new Set();
    const eliminated = new Set();
    if (changes) {
      for (const c of changes) {
        (c.type === 'placed' ? placed : eliminated).add(`${c.row},${c.col}`);
      }
    }

    const table = document.getElementById('board');
    table.innerHTML = '';

    for (let row = 0; row < 9; row++) {
      const tr = document.createElement('tr');
      for (let col = 0; col < 9; col++) {
        const cell = board[row][col];
        const td   = document.createElement('td');
        td.dataset.row = row;
        td.dataset.col = col;

        if (col === 2 || col === 5) td.classList.add('box-right');
        if (row === 2 || row === 5) td.classList.add('box-bottom');

        const key = `${row},${col}`;
        if      (placed.has(key))     td.classList.add('hl-placed');
        else if (eliminated.has(key)) td.classList.add('hl-eliminated');

        if (cell.value !== 0) {
          const span = document.createElement('span');
          span.className   = cell.given ? 'given' : 'solved';
          span.textContent = cell.value;
          td.appendChild(span);
        } else {
          const grid = document.createElement('div');
          grid.className = 'candidates';
          for (let d = 1; d <= 9; d++) {
            const s = document.createElement('span');
            s.textContent = cell.candidates.includes(d) ? d : '';
            grid.appendChild(s);
          }
          td.appendChild(grid);
        }

        tr.appendChild(td);
      }
      table.appendChild(tr);
    }
  }

  // ── Status log ───────────────────────────────────────────────────────────

  function updateStatus(data) {
    const header = document.getElementById('status-header');
    const log    = document.getElementById('status-log');
    const label  = SOLVER_LABELS[data.solver] || data.solver;

    if (data.changes.length === 0) {
      header.textContent = `${label} — no changes`;
      log.innerHTML = '<div class="log-none">Nothing to do.</div>';
      return;
    }

    header.textContent = `${label} — ${data.placed} placed, ${data.eliminated} eliminated`;

    // Placements first, then eliminations, each sorted by row then col
    const placed = data.changes.filter(c => c.type === 'placed');
    const elim   = data.changes.filter(c => c.type === 'eliminated');

    const lines = [
      ...placed.map(c =>
        `<div class="log-placed">Placed <strong>${c.value}</strong> → row ${c.row + 1}, col ${c.col + 1}</div>`
      ),
      ...elim.map(c =>
        `<div class="log-eliminated">Removed candidate <strong>${c.value}</strong> from row ${c.row + 1}, col ${c.col + 1}</div>`
      ),
    ];

    log.innerHTML = lines.join('');
    log.scrollTop = 0;
  }

  // ── Button state ─────────────────────────────────────────────────────────

  function setSolverButtonsDisabled(disabled) {
    document.querySelectorAll('.solver-btn').forEach(b => b.disabled = disabled);
  }

  // ── Actions ──────────────────────────────────────────────────────────────

  async function runSolver(key) {
    setSolverButtonsDisabled(true);
    try {
      const res  = await fetch(`/run/${key}`, { method: 'POST' });
      const data = await res.json();
      renderBoard(data.board, data.changes);
      updateStatus(data);
      if (data.is_solved) {
        boardSolved = true;
        document.getElementById('board').classList.add('solved-glow');
        document.getElementById('solved-banner').style.display = 'block';
        document.getElementById('reset-btn').disabled = false;
      }
    } catch (e) {
      document.getElementById('status-header').textContent = 'Error — see console.';
      console.error(e);
    } finally {
      if (!boardSolved) setSolverButtonsDisabled(false);
    }
  }

  async function resetBoard() {
    try {
      const res  = await fetch('/reset', { method: 'POST' });
      const data = await res.json();
      boardSolved = false;
      renderBoard(data.board, []);
      document.getElementById('status-header').textContent = 'Ready — make a move.';
      document.getElementById('status-log').innerHTML = '';
      document.getElementById('board').classList.remove('solved-glow');
      document.getElementById('solved-banner').style.display = 'none';
      document.getElementById('reset-btn').disabled = false;
      setSolverButtonsDisabled(false);
    } catch (e) {
      console.error(e);
    }
  }

  // ── Help panel ───────────────────────────────────────────────────────────

  const DEFAULT_HELP_TEXT =
    'This is an automatic Sudoku solver. Use the buttons above to apply ' +
    'solving techniques one step at a time — each technique either places a ' +
    'digit directly into a cell or eliminates candidates to narrow down ' +
    'possibilities. Click the <strong>?</strong> button next to any technique ' +
    'to see a fuller explanation, a quick checklist, and a small diagram.';

  function buildHelp(title, badge, paragraphs, bullets, diagramHtml) {
    return `
      <div class="help-entry">
        <div class="help-badge">${badge}</div>
        <h4>${title}</h4>
        ${paragraphs.map(text => `<p>${text}</p>`).join('')}
        <ul>${bullets.map(text => `<li>${text}</li>`).join('')}</ul>
        ${diagramHtml}
      </div>
    `;
  }

  function cell(label, main, cls = '') {
    return `
      <div class="mini-cell ${cls}">
        <div class="mini-cell-label">${label}</div>
        <div class="mini-cell-main">${main}</div>
      </div>
    `;
  }

  function diagram(title, cols, cells, legend = [], caption = '') {
    return `
      <div class="help-diagram">
        <div class="help-diagram-title">${title}</div>
        <div class="mini-grid cols-${cols}">
          ${cells.join('')}
        </div>
        ${caption ? `<div class="help-diagram-caption">${caption}</div>` : ''}
        ${legend.length ? `
          <div class="mini-legend">
            ${legend.map(item => `<span class="${item.cls || ''}">${item.label}</span>`).join('')}
          </div>
        ` : ''}
      </div>
    `;
  }

  const HELP_TEXTS = {
    'NakedSingleSolver': buildHelp(
      'Naked Singles',
      'Placer',
      [
        'A naked single appears when candidate elimination has already reduced one unsolved cell down to a single possible digit. At that point there is no branching left: the cell is forced.',
        'This is a cell-based pattern. You do not need to compare the cell to every other location in the row, column, or box. If the cell itself has only one candidate, that candidate must be written in immediately.'
      ],
      [
        'Look for an unsolved cell whose candidate list has length 1.',
        'Why it works: every other digit has already been blocked by a peer in the same row, column, or box.',
        'What happens next: place the remaining digit, then remove it from all peer candidates.'
      ],
      diagram(
        'Example',
        3,
        [
          cell('r4c4', '4', 'muted'),
          cell('r4c5', '{8}', 'keep'),
          cell('r4c6', '1', 'muted')
        ],
        [
          { label: 'forced cell', cls: 'keep' }
        ],
        'Only 8 remains in r4c5, so the solver can place 8 there immediately.'
      )
    ),

    'HiddenSingleSolver': buildHelp(
      'Hidden Singles',
      'Placer',
      [
        'A hidden single is found by scanning an entire unit rather than staring at one cell. A digit may still be mixed in with other candidates, but if it appears in only one position in a row, column, or box, that position is forced.',
        'The digit is "hidden" because the target cell might still look messy. What matters is not how many candidates the cell has, but that every other location for that specific digit inside the unit has already been ruled out.'
      ],
      [
        'Look for a digit that appears only once across all candidate lists in one row, column, or box.',
        'Why it works: the unit must contain that digit somewhere, and there is only one legal location left.',
        'What happens next: place the hidden digit even if the cell still shows extra candidates.'
      ],
      diagram(
        'Row Scan',
        4,
        [
          cell('r6c1', '{1,3}', 'muted'),
          cell('r6c2', '{2,7,9}', 'focus'),
          cell('r6c3', '{3,8}', 'muted'),
          cell('r6c4', '{1,5,9}', 'muted')
        ],
        [
          { label: 'only place for 7', cls: 'focus' }
        ],
        'Candidate 7 appears only in r6c2 within this row, so 7 is placed there.'
      )
    ),

    'PointingPairsSolver': buildHelp(
      'Pointing Pairs',
      'Eliminator',
      [
        'Pointing pairs and pointing triples use information from a 3x3 box to attack a row or column. If every candidate for one digit inside the box sits on the same line, the digit must be placed on that line somewhere inside the box.',
        'Because of that, the same digit cannot also appear elsewhere on the shared row or column outside the box. The pattern is called a pair when two cells are involved and a triple when three cells are involved.'
      ],
      [
        'Look for one digit in a single box that is confined to one row or one column.',
        'Why it works: the box has already claimed that digit for the highlighted line segment.',
        'What happens next: eliminate that digit from the rest of the same row or column outside the box.'
      ],
      diagram(
        'Box Forces A Row',
        5,
        [
          cell('box r2c1', '{5,7}', 'focus'),
          cell('box r2c2', '{5,9}', 'focus'),
          cell('box r2c3', '{1,4}', 'muted'),
          cell('r2c5', '5', 'cut'),
          cell('r2c8', '5', 'cut')
        ],
        [
          { label: 'inside box', cls: 'focus' },
          { label: 'eliminate outside box', cls: 'cut' }
        ],
        'Inside the box, candidate 5 only appears on row 2, so every other 5 on row 2 outside the box can be removed.'
      )
    ),

    'NakedPairSolver': buildHelp(
      'Naked Pairs',
      'Eliminator',
      [
        'A naked pair occurs when two cells in the same unit contain exactly the same two candidates and no others. Those two digits must occupy those two cells in some order.',

  function showHelp(key) {
    document.getElementById('help-text').innerHTML = HELP_TEXTS[key] || DEFAULT_HELP_TEXT;
    document.getElementById('help-text').scrollTop = 0;
    document.getElementById('help-close').style.display = 'flex';
  }

  function closeHelp() {
    document.getElementById('help-text').innerHTML = DEFAULT_HELP_TEXT;
    document.getElementById('help-text').scrollTop = 0;
    document.getElementById('help-close').style.display = 'none';
  }

  // ── Init ─────────────────────────────────────────────────────────────────

  // Pin the controls column to the board's actual rendered height so the
  // eliminators list scrolls rather than pushing the column taller.
  function syncControlsHeight() {
    document.querySelector('.controls').style.height =
      document.getElementById('board').offsetHeight + 'px';
  }

  renderBoard({{ board_json | tojson }}, []);
  document.getElementById('help-text').innerHTML = DEFAULT_HELP_TEXT;
  syncControlsHeight();
